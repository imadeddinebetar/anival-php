[supervisord]
nodaemon=true
logfile=/var/www/html/storage/logs/supervisord.log
pidfile=/var/www/html/storage/supervisord.pid
childlogdir=/var/www/html/storage/logs

[program:queue-worker-default]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/html/bin/worker.php queue:work --queue=default
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www
numprocs=3
redirect_stderr=true
stdout_logfile=/var/www/html/storage/logs/worker-default.log
stopwaitsecs=30
startsecs=0

[program:queue-worker-high]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/html/bin/worker.php queue:work --queue=high
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/html/storage/logs/worker-high.log
stopwaitsecs=30
startsecs=0

[program:queue-worker-low]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/html/bin/worker.php queue:work --queue=low
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/html/storage/logs/worker-low.log
stopwaitsecs=30
startsecs=0

[program:scheduler]
process_name=%(program_name)s
command=php /var/www/html/bin/worker.php schedule:run
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/html/storage/logs/scheduler.log
